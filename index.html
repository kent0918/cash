<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ 7日遊旅遊費用【雲端跨裝置同步版】</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 30px;
        }
        p.tip {
            color: #666; 
            font-size: 14px;
            background: #fff9db;
            padding: 8px 12px;
            border-left: 4px solid #f59f00;
            border-radius: 4px;
        }
        .cloud-box {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-danger { background-color: #e74c3c; }
        button.btn-danger:hover { background-color: #c0392b; }
        button.btn-success { background-color: #2ecc71; width: 100%; padding: 15px; font-size: 18px; margin-top: 15px;}
        button.btn-success:hover { background-color: #27ae60; }
        button.btn-warning { background-color: #f39c12; color: white;}
        button.btn-warning:hover { background-color: #d35400; }
        
        .member-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .member-row input { flex: 1; }

        .expense-row {
            display: grid;
            grid-template-columns: 140px 2fr 1fr 1.2fr auto;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        @media (max-width: 600px) {
            .expense-row { grid-template-columns: 1fr; }
        }

        .result-box {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .positive { color: #27ae60; font-weight: bold; }
        .negative { color: #c0392b; font-weight: bold; }
        .save-status {
            color: #27ae60;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">✈️ 旅遊費用分帳計算機 (跨裝置雲端同步版)</h1>
    
    <!-- 雲端同步控制區塊 -->
    <div class="cloud-box">
        🔑 <b>您的專屬雲端同步代碼：</b>
        <input type="text" id="cloud-id" placeholder="正在取得代碼..." style="width: 220px; font-weight: bold; text-align: center; background: #fff;" readonly>
        <button type="button" onclick="copyCloudId()">📋 複製代碼</button>
        <button type="button" class="btn-warning" onclick="connectManualId()">🔗 輸入代碼同步</button>
        <span id="save-msg" class="save-status">☁️ 雲端已同步</span>
    </div>
    
    <!-- 1. 人員名單與初始公費 -->
    <div class="section">
        <h2>1. 朋友成員與公費設定</h2>
        <p class="tip">請輸入成員名字與預繳公費。此版本支援手機與電腦即時同步！</p>
        <div id="member-container"></div>
        <button type="button" onclick="addMemberRow('', 0)">➕ 新增成員</button>
    </div>

    <!-- 2. 支出項目 -->
    <div class="section">
        <h2>2. 7日旅遊支出明細</h2>
        <p class="tip">記錄每一天的開銷。您可以自由選擇日期、輸入項目與金額，並選擇是由公費還是某人墊付。</p>
        <div id="expense-container"></div>
        <button type="button" onclick="addExpenseRow('', '', 0, '公費')">➕ 新增支出項目</button>
    </div>

    <!-- 3. 開始計算 -->
    <button type="button" class="btn-success" onclick="calculateExpenses()">📊 開始計算分帳結果</button>

    <!-- 4. 結果顯示 -->
    <div id="result-section" class="section" style="display:none; margin-top: 30px;">
        <h2>📝 計算結果明細</h2>
        <div class="summary-grid">
            <div>💰 <b>預收公費總額：</b> <span id="total-pool">0</span> 元</div>
            <div>💸 <b>公費已支出：</b> <span id="pool-spent">0</span> 元</div>
            <div>🏦 <b>公費目前剩餘：</b> <span id="pool-remain">0</span> 元</div>
            <div>🔥 <b>旅程總花費：</b> <span id="total-trip-cost">0</span> 元</div>
            <div>👤 <b>每人應分攤：</b> <span id="per-person-share">0</span> 元</div>
        </div>

        <h3>💡 最終結算（每人該補錢或退錢）</h3>
        <table>
            <thead>
                <tr>
                    <th>姓名</th>
                    <th>當初已繳公費</th>
                    <th>個人先行墊付</th>
                    <th>應分攤總額</th>
                    <th>最終結算結果</th>
                </tr>
            </thead>
            <tbody id="result-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 使用免註冊的公共 json 快取 API
    const API_BASE = "https://jsonblob.com/api/jsonBlob";
    let cloudId = ""; 
    let isDataLoading = false;

    window.onload = async function() {
        // 先檢查網址有沒有帶代碼，或是本機有沒有存過代碼
        const urlParams = new URLSearchParams(window.location.search);
        let savedId = urlParams.get('id') || localStorage.getItem('travel_cloud_id');

        if (savedId) {
            cloudId = savedId;
            document.getElementById('cloud-id').value = cloudId;
            await loadFromCloud();
        } else {
            // 沒有代碼，代表是第一次用，自動去雲端抓一個新的儲存箱
            await createCloudBox();
        }

        // 監聽變動，自動同步到雲端
        document.getElementById('member-container').addEventListener('input', debounceAutoSave);
        document.getElementById('expense-container').addEventListener('input', debounceAutoSave);
        document.getElementById('expense-container').addEventListener('change', debounceAutoSave);
    };

    // 建立新的雲端空間
    async function createCloudBox() {
        try {
            const defaultData = {
                members: [{ name: '成員A', pool: 3000 }, { name: '成員B', pool: 3000 }],
                expenses: [{ date: new Date().toISOString().split('T')[0], item: '第一天晚餐', cost: 1200, payer: '公費' }]
            };
            const response = await fetch(API_BASE, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(defaultData)
            });
            // 從 Response Header 拿到這個箱子的專屬 ID
            const locationHeader = response.headers.get('Location');
            cloudId = locationHeader.substring(locationHeader.lastIndexOf('/') + 1);
            
            document.getElementById('cloud-id').value = cloudId;
            localStorage.setItem('travel_cloud_id', cloudId);
            renderData(defaultData);
        } catch (e) {
            alert("建立雲端同步失敗，改用離線模式");
            renderData({ members: [], expenses: [] });
        }
    }

    // 從雲端下載資料
    async function loadFromCloud() {
        if(!cloudId) return;
        isDataLoading = true;
        updateStatus("🔄 正在從雲端更新資料...");
        try {
            const response = await fetch(`${API_BASE}/${cloudId}`);
            const data = await response.json();
            renderData(data);
            updateStatus("☁️ 雲端已同步 (最新)");
        } catch (e) {
            updateStatus("❌ 雲端讀取失敗，請確認代碼");
        }
        isDataLoading = false;
    }

    // 將資料渲染到畫面上
    function renderData(data) {
        document.getElementById('member-container').innerHTML = '';
        document.getElementById('expense-container').innerHTML = '';
        
        if(data.members && data.members.length > 0) {
            data.members.forEach(m => addMemberRow(m.name, m.pool));
        } else {
            addMemberRow('', 0);
        }
        
        if(data.expenses && data.expenses.length > 0) {
            data.expenses.forEach(e => addExpenseRow(e.date, e.item, e.cost, e.payer));
        } else {
            addExpenseRow('', '', 0, '公費');
        }
        updatePayerOptions();
    }

    // 防抖動設計：避免每打一個字就一直發送網路請求，等停下 0.8 秒後才存檔
    let saveTimeout;
    function debounceAutoSave() {
        if(isDataLoading) return;
        updateStatus("✍️ 偵測到修改，準備上傳...");
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveToCloud, 800);
    }

    // 上傳存檔到雲端
    async function saveToCloud() {
        if(!cloudId) return;
        updateStatus("📤 正在同步到雲端...");
        
        const membersData = [];
        document.querySelectorAll('#member-container .member-row').forEach(row => {
            const name = row.querySelector('.m-name').value.trim();
            const pool = row.querySelector('.m-pool').value;
            if(name) membersData.push({ name, pool: parseFloat(pool) || 0 });
        });

        const expensesData = [];
        document.querySelectorAll('#expense-container .expense-row').forEach(row => {
            const date = row.querySelector('.e-date').value;
            const item = row.querySelector('.e-item').value;
            const cost = row.querySelector('.e-cost').value;
            const payer = row.querySelector('.e-payer').value;
            expensesData.push({ date, item, cost: parseFloat(cost) || 0, payer });
        });

        try {
            await fetch(`${API_BASE}/${cloudId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ members: membersData, expenses: expensesData })
            });
            updateStatus("☁️ 雲端已同步 (最新)");
        } catch (e) {
            updateStatus("❌ 雲端同步失敗");
        }
    }

    // 手動輸入代碼連結其他裝置
    async function connectManualId() {
        const inputId = prompt("請輸入另一台裝置顯示的【雲端同步代碼】:");
        if (inputId && inputId.trim()) {
            cloudId = inputId.trim();
            document.getElementById('cloud-id').value = cloudId;
            localStorage.setItem('travel_cloud_id', cloudId);
            // 嘗試重新整理網址列，方便以後直接進來
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + cloudId;
            window.history.pushState({path:newUrl},'',newUrl);
            await loadFromCloud();
        }
    }

    function updateStatus(text) {
        document.getElementById('save-msg').textContent = text;
    }

    function copyCloudId() {
        navigator.clipboard.writeText(cloudId);
        alert("代碼已複製！可以傳給手機或其他朋友了。");
    }

    function getMemberList() {
        const members = [];
        document.querySelectorAll('#member-container .member-row').forEach(row => {
            const name = row.querySelectorAll('input')[0].value.trim();
            if(name) members.push(name);
        });
        return members;
    }

    function updatePayerOptions() {
        const members = getMemberList();
        document.querySelectorAll('.payer-select').forEach(select => {
            const currentValue = select.value;
            select.innerHTML = '<option value="公費">👛 公費支付</option>';
            members.forEach(member => {
                const opt = document.createElement('option');
                opt.value = member;
                opt.textContent = `👤 ${member} 代墊`;
                select.appendChild(opt);
            });
            if (members.includes(currentValue) || currentValue === '公費') {
                select.value = currentValue;
            }
        });
    }

    function addMemberRow(name = '', pool = 0) {
        const container = document.getElementById('member-container');
        const div = document.createElement('div');
        div.className = 'member-row';
        div.innerHTML = `
            <input type="text" placeholder="成員姓名" value="${name}" class="m-name">
            <input type="number" placeholder="已繳公費金額" value="${pool}" min="0" class="m-pool">
            <button type="button" class="btn-danger" onclick="this.parentElement.remove(); updatePayerOptions(); debounceAutoSave();">刪除</button>
        `;
        container.appendChild(div);
        div.querySelector('.m-name').addEventListener('input', () => {
            updatePayerOptions();
            debounceAutoSave();
        });
        updatePayerOptions();
    }

    function addExpenseRow(date = '', item = '', cost = 0, payer = '公費') {
        const container = document.getElementById('expense-container');
        const div = document.createElement('div');
        div.className = 'expense-row';
        div.innerHTML = `
            <input type="date" value="${date}" class="e-date">
            <input type="text" placeholder="項目 (如: 晚餐、車資)" value="${item}" class="e-item">
            <input type="number" placeholder="金額" value="${cost}" min="0" class="e-cost">
            <select class="payer-select e-payer">
                <option value="公費">👛 公費支付</option>
            </select>
            <button type="button" class="btn-danger" onclick="this.parentElement.remove(); debounceAutoSave();">刪除</button>
        `;
        container.appendChild(div);
        updatePayerOptions();
        div.querySelector('.e-payer').value = payer;
    }

    function calculateExpenses() {
        // 先手動觸發一次最新同步，確保計算的是雲端最新資料
        saveToCloud();
        
        const memberRows = document.querySelectorAll('#member-container .member-row');
        const expenseRows = document.querySelectorAll('#expense-container .expense-row');
        
        let members = [];
        let totalInitialPool = 0;
        
        memberRows.forEach(row => {
            const name = row.querySelector('.m-name').value.trim();
            const poolPaid = parseFloat(row.querySelector('.m-pool').value) || 0;
            if (name) {
                members.push({ name: name, poolPaid: poolPaid, ownSpent: 0, finalBalance: 0 });
                totalInitialPool += poolPaid;
            }
        });

        if (members.length === 0) { alert('請至少輸入一位成員！'); return; }

        let poolSpent = 0; let totalPersonalSpent = 0;

        expenseRows.forEach(row => {
            const cost = parseFloat(row.querySelector('.e-cost').value) || 0;
            const payer = row.querySelector('.e-payer').value;
            if (payer === '公費') { poolSpent += cost; } 
            else {
                const member = members.find(m => m.name === payer);
                if (member) { member.ownSpent += cost; totalPersonalSpent += cost; }
            }
        });

        const totalTripCost = poolSpent + totalPersonalSpent;
        const perPersonShare = totalTripCost / members.length;
        const poolRemain = totalInitialPool - poolSpent;

        const tbody = document.getElementById('result-table-body');
        tbody.innerHTML = '';

        members.forEach(m => {
            const totalPaid = m.poolPaid + m.ownSpent;
            const balance = totalPaid - perPersonShare;
            let balanceText = (balance < 0) ? `<span class="negative">🔻 應補繳 ${Math.abs(Math.round(balance))} 元</span>` : (balance > 0) ? `<span class="positive">🎉 可退回 ${Math.round(balance)} 元</span>` : `<span>🤝 0 元 (平手)</span>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${m.name}</b></td><td>${m.poolPaid} 元</td><td>${m.ownSpent} 元</td><td>${Math.round(perPersonShare)} 元</td><td>${balanceText}</td>`;
            tbody.appendChild(tr);
        });

        document.getElementById('total-pool').textContent = Math.round(totalInitialPool);
        document.getElementById('pool-spent').textContent = Math.round(poolSpent);
        document.getElementById('pool-remain').textContent = Math.round(poolRemain);
        document.getElementById('total-trip-cost').textContent = Math.round(totalTripCost);
        document.getElementById('per-person-share').textContent = Math.round(perPersonShare);

        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
